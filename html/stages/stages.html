<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SplatNet | Stages</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
    }

    body {
        background-image: url("../../assets/stage.png");
        background-repeat: repeat;
        background-size: 800px 800px;
    }

    /* HEADER */
    .header {
        position: relative;
        height: 150px;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: flex-start;

        clip-path: polygon(
            0% 0%, 100% 0%, 100% 80%, 
            90% 85%, 80% 75%, 70% 85%, 
            60% 75%, 50% 85%, 40% 75%, 
            30% 85%, 20% 75%, 10% 85%, 
            0% 80%
        );
    }

    .hamburger {
        position: absolute;
        left: 40px;
        top: 40%;
        transform: translateY(-50%);
        height: 50px;
        cursor: pointer;
        z-index: 3;
    }

    .logo {
        max-height: 120px;
        z-index: 2;
    }

    /* MAIN CONTENT */
    .content {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 24px;
    }

    .stage-info {
        width: 65%;
        max-width: 600px;
        height: auto;
        margin-bottom: 20px;
    }
    
    .stages-container {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
    }
</style>
</head>

<body>

<div class="header">
    <img src="../../assets/hamburgerbar.png" class="hamburger" alt="Menu">
    <img src="../../assets/SplatNetLogo.png" class="logo" alt="SplatNet Logo">
</div>

<div class="content">
    <img src="../../assets/stageinfo.png" class="stage-info" alt="Stage Info">

    <div class="stages-container" id="stages-container"></div>
</div>

<script src="stages.js"></script>

</body>
</html>
